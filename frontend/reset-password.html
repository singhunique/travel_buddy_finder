<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Travel Buddy Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="main-shell" style="padding-top: 60px;">
    <section class="panel" style="max-width: 520px; margin: 0 auto;">
      <div class="panel-head">
        <h3>Reset Password</h3>
        <p>Enter your new password below.</p>
      </div>

      <form id="resetPasswordForm" class="form-grid">
        <div class="input-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="New password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
      </form>

      <div id="resetMessage" style="margin-top: 14px;"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById("resetPasswordForm");
    const messageBox = document.getElementById("resetMessage");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const newPassword = document.getElementById("newPassword").value;

      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token, newPassword })
      });

      const data = await res.json();

      if (!res.ok) {
        messageBox.innerHTML = `<p style="color:#d64242;">${data.message || "Reset failed."}</p>`;
        return;
      }

      messageBox.innerHTML = `<p style="color:#1e9f5e;">${data.message}</p>`;
      form.reset();
    });
  </script>
</body>
</html>
